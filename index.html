  <!-- ==========================================
    TYPEFORM (template de formulario conversacional)
    Para usar:
      1. Adicione no <head>:
            <link rel="stylesheet" href="typeform.css">
      2. Adicione antes de </body>:
            <script src="typeform.js" defer></script>
      3. Cole o bloco abaixo no lugar desejado.

    Tipos de step disponiveis:
      - Texto simples:  <input type="text" ...>
      - E-mail:         <input type="email" ...>
      - Numero:         <input type="number" ...>
      - Escolha unica:  [data-tf-choice] sem [data-multiple]  → auto-avanca
      - Escolha multipla: [data-multiple] no data-step        → botao OK

    Atributos do data-step:
      data-step="N"        → numero do step (qualquer valor unico)
      data-name="chave"    → chave usada para salvar a resposta de choices
      data-required        → exige ao menos uma choice selecionada
      data-multiple        → permite selecionar mais de uma choice

    Submissao:
      - Sem form Netlify:  mostra [data-tf-end] ao terminar
      - Com form Netlify:  envia os dados e redireciona (data-redirect) ou mostra [data-tf-end]
  -->

        <span class="typeform-error" role="alert"></span>
        <div class="typeform-actions">
          <button type="button" class="typeform-btn-next" data-tf-btn-next>OK ✓</button>
          <span class="typeform-hint"><strong>Enter ↵</strong> para continuar</span>
        </div>
      </div>
    </div>

    <!- - STEP 3: Escolha unica (auto-avanca) - ->
    <div class="typeform-step" data-step="3" data-name="desafio" data-required>
      <div class="typeform-question">
        <span class="typeform-counter" aria-hidden="true">
          <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="4.5"/></svg>
          3
        </span>
        <h2>Qual é o seu maior desafio hoje?</h2>
      </div>
      <div class="typeform-choices">
        <button type="button" class="typeform-choice" data-tf-choice data-value="atrair-clientes">
          <span class="typeform-choice-key" aria-hidden="true">A</span>
          Atrair mais clientes
        </button>
        <button type="button" class="typeform-choice" data-tf-choice data-value="fechar-vendas">
          <span class="typeform-choice-key" aria-hidden="true">B</span>
          Fechar mais vendas
        </button>
        <button type="button" class="typeform-choice" data-tf-choice data-value="reter-clientes">
          <span class="typeform-choice-key" aria-hidden="true">C</span>
          Reter clientes
        </button>
        <button type="button" class="typeform-choice" data-tf-choice data-value="outro">
          <span class="typeform-choice-key" aria-hidden="true">D</span>
          Outro
        </button>
      </div>
      <span class="typeform-error" role="alert"></span>
    </div>

    <!- - Tela de obrigado - ->
    <div class="typeform-step typeform-end-screen" data-tf-end>
      <h2>Obrigado!</h2>
      <p>Recebemos suas informações e entraremos em contato em breve.</p>
    </div>

    <!- - Tela de erro - ->
    <div class="typeform-step typeform-end-screen" data-tf-error>
      <h2>Algo deu errado</h2>
      <p>Tente novamente mais tarde ou entre em contato diretamente.</p>
    </div>

    <!- - Form oculto para Netlify (data-redirect="/obrigado.html" opcional) - ->
